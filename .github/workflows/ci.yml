name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    shell: bash

env:
  TURBO_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/briefforge
  AUTH_SECRET: ci-evals-secret-min-32-chars-long
  BRIEFFORGE_DISABLE_LLM: "1"

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  evals:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: briefforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/briefforge
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-evals-secret-min-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
      BRIEFFORGE_EVAL_TOKEN: ci-eval-token
      BRIEFFORGE_DISABLE_LLM: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run migrations
        run: |
          psql "$DATABASE_URL" -f supabase/migrations/0001_init.sql
          psql "$DATABASE_URL" -f supabase/migrations/0002_jobs_created_at.sql

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed database (users + workspace)
        run: psql "$DATABASE_URL" -f supabase/seed.sql

      - name: Seed demo sources and jobs
        run: pnpm seed

      # Server and evals in same step so the background server stays alive for evals
      - name: Start web app and run evals
        run: |
          pnpm --filter @briefforge/web start &
          echo "Waiting for http://localhost:3000 ..."
          pnpm exec wait-on -t 60000 http://localhost:3000
          pnpm evals
