services:
  db:
    image: pgvector/pgvector:pg15
    container_name: briefforge-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: briefforge
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: briefforge-redis
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: briefforge-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  indexing-worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: briefforge-indexing-worker
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  db-data:

